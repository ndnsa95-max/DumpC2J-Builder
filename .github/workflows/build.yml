name: DumpC2J Kernel Builder

on:
  workflow_dispatch:
    inputs:
      kernel_name:
        description: "Custom Kernel Name (LOCALVERSION)"
        required: true
        type: string
        default: "-DumpC2J-Kernel"
      spoof_uname:
        description: "Spoof Uname (SUSFS/Stock Naming)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "on"
      clang_variant:
        description: "Clang Toolchain"
        required: true
        type: choice
        options:
          - neutron
          - cirrus
          - weebx
          - zyc
        default: cirrus
      hz:
        description: "Refresh Rate (HZ)"
        required: true
        type: choice
        options:
          - powersave
          - balance
          - smooth
          - performance
          - ultra-performance
        default: ultra-performance
      variant:
        description: "Build Variant"
        required: true
        type: choice
        options:
          - stock
          - root
          - susfs
        default: susfs
      root:
        description: "Root Method"
        required: true
        type: choice
        options:
          - none
          - ksu-next
          - kowsu
          - sukisu
          - resukisu
        default: resukisu
      lto:
        description: "LTO Mode"
        required: true
        type: choice
        options:
          - full
          - thin
          - none
        default: full
      bypasscharging:
        description: "Bypass Charging (MCA Override)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "on"
      droidspaces:
        description: "Droidspaces Support"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "off"
      kernel_version_spoof:
        description: "Spoof Kernel Version (kosongkan = pakai upstream)"
        required: false
        type: string
        default: ""
      debug:
        description: "Debug Mode (nokaslr, no optimizations)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "off"
      nomount:
        description: "NoMount (VFS Path Injection, no mount table)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "off"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: "Custom Build"
    runs-on: ubuntu-24.04
    outputs:
      lto_actual: ${{ steps.lto_output.outputs.lto_actual }}

    steps:
      - name: Validate Input Combination
        run: |
          if [ "${{ inputs.variant }}" == "susfs" ] && [ "${{ inputs.root }}" == "sukisu" ]; then
            echo "::error::SukiSU-Ultra + SUSFS is currently unsupported (linker conflicts with susfs4ksu). Use variant=root instead."
            exit 1
          fi
          if [ "${{ inputs.variant }}" == "root" ] && [ "${{ inputs.root }}" == "resukisu" ]; then
            echo "::error::ReSukiSU requires SUSFS — root-only mode is not supported. Use variant=susfs instead."
            exit 1
          fi
          echo "[+] Input combination valid: variant=${{ inputs.variant }}, root=${{ inputs.root }}"

      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          path: builder

      - name: Clone Kernel Source
        run: |
          git clone --depth=50 \
            --branch main \
            https://${{ secrets.GH_TOKEN }}@github.com/adennnqt/DumpC2J-Kernel \
            kernel-source

      - name: Parse Inputs
        id: setup_vars
        env:
          INPUT_HZ: ${{ inputs.hz }}
          INPUT_VARIANT: ${{ inputs.variant }}
          INPUT_ROOT: ${{ inputs.root }}
          INPUT_HARDENED: "off"
          INPUT_BYPASS: ${{ inputs.bypasscharging }}
          INPUT_DROIDSPACES: ${{ inputs.droidspaces }}
          INPUT_HTSR: "on"
          INPUT_WIFI: "on"
          INPUT_KGSL: "on"
          INPUT_DATA: "on"
          INPUT_DEBUG: ${{ inputs.debug }}
          INPUT_KERNEL_NAME: ${{ inputs.kernel_name }}
          INPUT_SPOOF_UNAME: ${{ inputs.spoof_uname }}
          INPUT_NOMOUNT: ${{ inputs.nomount }}
        run: |
          if [ "$INPUT_HZ" == "powersave" ]; then HZ_ID=100
          elif [ "$INPUT_HZ" == "balance" ]; then HZ_ID=250
          elif [ "$INPUT_HZ" == "performance" ]; then HZ_ID=500
          elif [ "$INPUT_HZ" == "smooth" ]; then HZ_ID=300
          elif [ "$INPUT_HZ" == "ultra-performance" ]; then HZ_ID=1000
          fi
          echo "HZ_ID=$HZ_ID" >> $GITHUB_ENV

          ACTUAL_ROOT="$INPUT_ROOT"
          if [ "$INPUT_VARIANT" == "stock" ]; then
            ACTUAL_ROOT="none"
          fi
          echo "ACTUAL_ROOT=$ACTUAL_ROOT" >> $GITHUB_ENV

          if [ "$INPUT_VARIANT" == "stock" ]; then
            BUILD_NAME="${INPUT_VARIANT}-${INPUT_HZ}"
          else
            BUILD_NAME="${INPUT_VARIANT}-${ACTUAL_ROOT}-${INPUT_HZ}"
          fi

          [ "$INPUT_BYPASS" == "on" ] && BUILD_NAME="${BUILD_NAME}-bypasscharging"
          [ "$INPUT_DROIDSPACES" == "on" ] && BUILD_NAME="${BUILD_NAME}-droidspaces"
          [ "$INPUT_DEBUG" == "on" ] && BUILD_NAME="${BUILD_NAME}-debug"
          [ "$INPUT_NOMOUNT" == "on" ] && BUILD_NAME="${BUILD_NAME}-nomount"

          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV

      - name: Create Swap
        run: |
          SWAPFILE="/mnt/build_swapfile"
          while true; do
            if sudo fallocate -l 10G $SWAPFILE || sudo dd if=/dev/zero of=$SWAPFILE bs=1M count=10240 status=progress; then
              break
            else
              sleep 5
            fi
          done
          sudo chmod 600 $SWAPFILE && sudo mkswap $SWAPFILE && sudo swapon $SWAPFILE

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf imagemagick \
            lib32ncurses-dev lib32readline-dev lib32z1-dev libncurses-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
            rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
            python3 clang lld llvm jq

      - name: Setup Clang
        run: |
          bash builder/scripts/setup_clang.sh ${{ inputs.clang_variant }}

      - name: Setup AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel
          cp kernel-source/anykernel/anykernel.sh anykernel/anykernel.sh
          cp -r kernel-source/anykernel/tools/* anykernel/tools/

      - name: Build Kernel
        env:
          INPUT_HZ: ${{ inputs.hz }}
          INPUT_VARIANT: ${{ inputs.variant }}
          INPUT_ROOT: ${{ inputs.root }}
          INPUT_LTO: ${{ inputs.lto }}
          INPUT_HARDENED: "off"
          INPUT_HTSR: "on"
          INPUT_WIFI: "on"
          INPUT_KGSL: "on"
          INPUT_DATA: "on"
          INPUT_BYPASS: ${{ inputs.bypasscharging }}
          INPUT_DROIDSPACES: ${{ inputs.droidspaces }}
          INPUT_DEBUG: ${{ inputs.debug }}
          INPUT_KERNEL_NAME: ${{ inputs.kernel_name }}
          INPUT_SPOOF_UNAME: ${{ inputs.spoof_uname }}
          INPUT_VERSION_SPOOF: ${{ inputs.kernel_version_spoof }}
          INPUT_NOMOUNT: ${{ inputs.nomount }}
        run: |
          bash builder/scripts/build.sh

      - name: Set LTO Output
        id: lto_output
        run: echo "lto_actual=${{ env.LTO_ACTUAL }}" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: bash builder/scripts/notify_telegram.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DumpC2J-${{ env.BUILD_NAME }}
          path: kernel-source/DumpC2J-Release
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare assets
        run: |
          mkdir -p release_assets
          find artifacts -type f -name "*.zip" -exec mv {} release_assets/ \; || true
          find artifacts -type f -name "*.img" -exec mv {} release_assets/ \; || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.sha }}
          name: DumpC2J Build ${{ github.run_number }}
          body: |
            ## DumpC2J Kernel — Automated Build

            **Variant:** ${{ inputs.variant }}
            **HZ:** ${{ inputs.hz }}
            **Root:** ${{ inputs.root }}
            **Clang:** ${{ inputs.clang_variant }}
            **LTO:** ${{ needs.build.outputs.lto_actual }}

            ### Performance Mods
            | Feature | Status |
            |---------|--------|
            | Bypass Charging | ${{ inputs.bypasscharging }} |
            | Droidspaces | ${{ inputs.droidspaces }} |
            | Debug Mode | ${{ inputs.debug }} |
            | NoMount | ${{ inputs.nomount }} |

            Commit: ${{ github.sha }}
          files: release_assets/*
