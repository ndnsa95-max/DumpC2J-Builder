name: DumpC2J Kernel Builder

on:
  workflow_dispatch:
    inputs:
      kernel_name:
        description: "Custom Kernel Name (LOCALVERSION)"
        required: true
        type: string
        default: "-DumpC2J-Kernel"
      spoof_uname:
        description: "Spoof Uname (SUSFS/Stock Naming)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "on"
      clang_variant:
        description: "Clang Toolchain"
        required: true
        type: choice
        options:
          - neutron
          - cirrus
          - weebx
          - zyc
        default: cirrus
      hz:
        description: "Refresh Rate (HZ)"
        required: true
        type: choice
        options:
          - powersave
          - balance
          - performance
          - ultra-performance
        default: ultra-performance
      variant:
        description: "Build Variant"
        required: true
        type: choice
        options:
          - stock
          - root
          - susfs
        default: susfs
      root:
        description: "Root Method"
        required: true
        type: choice
        options:
          - none
          - ksu
          - ksu-next
          - sukisu
          - yukisu
          - resukisu
          - mambosu
          - apatch
          - folkpatch
        default: resukisu
      kpm:
        description: "Kernel Patch Module (KPM)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "off"
      hardened:
        description: "Hardened Kernel"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "off"
      bypasscharging:
        description: "Bypass Charging (MCA Override)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "on"
      droidspaces:
        description: "Droidspaces Support"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "off"
      htsr:
        description: "HTSR 240Hz Touch Sampling"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "on"
      wifi_exploit:
        description: "WiFi Performance Exploits (WLM, Coex, BBR)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "on"
      kgsl_exploit:
        description: "KGSL GPU Bypass (LM_LIMIT, DCVS)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "on"
      data_exploit:
        description: "Mobile Data Exploits (DFC, Powersave)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "on"
      kernel_version_spoof:
        description: "Spoof Kernel Version (kosongkan = pakai upstream)"
        required: false
        type: string
        default: ""
      debug:
        description: "Debug Mode (nokaslr, no optimizations)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "off"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: "Custom Build"
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          path: builder

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 \
            --branch main \
            https://${{ secrets.GH_TOKEN }}@github.com/ndnsa95-max/DumpC2J-Kernel \
            kernel-source

      - name: Parse Inputs
        id: setup_vars
        env:
          INPUT_HZ: ${{ inputs.hz }}
          INPUT_VARIANT: ${{ inputs.variant }}
          INPUT_ROOT: ${{ inputs.root }}
          INPUT_KPM: ${{ inputs.kpm }}
          INPUT_HARDENED: ${{ inputs.hardened }}
          INPUT_BYPASS: ${{ inputs.bypasscharging }}
          INPUT_DROIDSPACES: ${{ inputs.droidspaces }}
          INPUT_HTSR: ${{ inputs.htsr }}
          INPUT_WIFI: ${{ inputs.wifi_exploit }}
          INPUT_KGSL: ${{ inputs.kgsl_exploit }}
          INPUT_DATA: ${{ inputs.data_exploit }}
          INPUT_DEBUG: ${{ inputs.debug }}
          INPUT_KERNEL_NAME: ${{ inputs.kernel_name }}
          INPUT_SPOOF_UNAME: ${{ inputs.spoof_uname }}
        run: |
          if [ "$INPUT_HZ" == "powersave" ]; then HZ_ID=100
          elif [ "$INPUT_HZ" == "balance" ]; then HZ_ID=250
          elif [ "$INPUT_HZ" == "performance" ]; then HZ_ID=500
          elif [ "$INPUT_HZ" == "ultra-performance" ]; then HZ_ID=1000
          fi
          echo "HZ_ID=$HZ_ID" >> $GITHUB_ENV

          ACTUAL_ROOT="$INPUT_ROOT"
          if [ "$INPUT_VARIANT" == "stock" ]; then
            ACTUAL_ROOT="none"
          fi
          echo "ACTUAL_ROOT=$ACTUAL_ROOT" >> $GITHUB_ENV

          if [ "$INPUT_VARIANT" == "stock" ]; then
            BUILD_NAME="${INPUT_VARIANT}-${INPUT_HZ}"
          else
            BUILD_NAME="${INPUT_VARIANT}-${ACTUAL_ROOT}-${INPUT_HZ}"
          fi

          if [ "$INPUT_KPM" == "on" ] || [ "$ACTUAL_ROOT" == "apatch" ] || [ "$ACTUAL_ROOT" == "folkpatch" ]; then
            BUILD_NAME="${BUILD_NAME}-kpm"
          fi
          [ "$INPUT_HARDENED" == "on" ] && BUILD_NAME="${BUILD_NAME}-hardened"
          [ "$INPUT_BYPASS" == "on" ] && BUILD_NAME="${BUILD_NAME}-bypasscharging"
          [ "$INPUT_DROIDSPACES" == "on" ] && BUILD_NAME="${BUILD_NAME}-droidspaces"
          [ "$INPUT_HTSR" == "off" ] && BUILD_NAME="${BUILD_NAME}-nohtsr"
          [ "$INPUT_WIFI" == "off" ] && BUILD_NAME="${BUILD_NAME}-nowifi"
          [ "$INPUT_KGSL" == "off" ] && BUILD_NAME="${BUILD_NAME}-nokgsl"
          [ "$INPUT_DATA" == "off" ] && BUILD_NAME="${BUILD_NAME}-nodata"
          [ "$INPUT_DEBUG" == "on" ] && BUILD_NAME="${BUILD_NAME}-debug"

          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV

      - name: Create Swap
        run: |
          SWAPFILE="/mnt/build_swapfile"
          while true; do
            if sudo fallocate -l 10G $SWAPFILE || sudo dd if=/dev/zero of=$SWAPFILE bs=1M count=10240 status=progress; then
              break
            else
              sleep 5
            fi
          done
          sudo chmod 600 $SWAPFILE && sudo mkswap $SWAPFILE && sudo swapon $SWAPFILE

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf imagemagick \
            lib32ncurses-dev lib32readline-dev lib32z1-dev libncurses-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
            rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
            python3 clang lld llvm jq

      - name: Setup Clang
        run: |
          bash builder/scripts/setup_clang.sh ${{ inputs.clang_variant }}

      - name: Setup AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel
          cp kernel-source/anykernel/anykernel.sh anykernel/anykernel.sh
          cp -r kernel-source/anykernel/tools/* anykernel/tools/

      - name: Build Kernel
        env:
          KPM_SUPERKEY_SECRET: ${{ secrets.KPM_SUPERKEY }}
          INPUT_VARIANT: ${{ inputs.variant }}
          INPUT_ROOT: ${{ inputs.root }}
          INPUT_KPM: ${{ inputs.kpm }}
          INPUT_HARDENED: ${{ inputs.hardened }}
          INPUT_HTSR: ${{ inputs.htsr }}
          INPUT_WIFI: ${{ inputs.wifi_exploit }}
          INPUT_KGSL: ${{ inputs.kgsl_exploit }}
          INPUT_DATA: ${{ inputs.data_exploit }}
          INPUT_BYPASS: ${{ inputs.bypasscharging }}
          INPUT_DROIDSPACES: ${{ inputs.droidspaces }}
          INPUT_DEBUG: ${{ inputs.debug }}
          INPUT_KERNEL_NAME: ${{ inputs.kernel_name }}
          INPUT_SPOOF_UNAME: ${{ inputs.spoof_uname }}
          INPUT_VERSION_SPOOF: ${{ inputs.kernel_version_spoof }}
        run: |
          bash builder/scripts/build.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DumpC2J-${{ env.BUILD_NAME }}
          path: kernel-source/DumpC2J-Release
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare assets
        run: |
          mkdir -p release_assets
          find artifacts -type f -name "*.zip" -exec mv {} release_assets/ \; || true
          find artifacts -type f -name "*.img" -exec mv {} release_assets/ \; || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.sha }}
          name: DumpC2J Build ${{ github.run_number }}
          body: |
            ## DumpC2J Kernel — Automated Build

            **Variant:** ${{ inputs.variant }}
            **HZ:** ${{ inputs.hz }}
            **Root:** ${{ inputs.root }}
            **KPM:** ${{ inputs.kpm }}
            **Hardened:** ${{ inputs.hardened }}
            **Clang:** ${{ inputs.clang_variant }}

            ### Performance Mods
            | Feature | Status |
            |---------|--------|
            | Bypass Charging | ${{ inputs.bypasscharging }} |
            | Droidspaces | ${{ inputs.droidspaces }} |
            | HTSR 240Hz Touch | ${{ inputs.htsr }} |
            | WiFi Exploits | ${{ inputs.wifi_exploit }} |
            | KGSL GPU Bypass | ${{ inputs.kgsl_exploit }} |
            | Data Exploits | ${{ inputs.data_exploit }} |
            | Debug Mode | ${{ inputs.debug }} |

            Commit: ${{ github.sha }}
          files: release_assets/*
